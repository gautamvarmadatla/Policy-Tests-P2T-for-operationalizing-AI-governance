  scope:
    actor:
    - entity
    data_domain: []
    context: []
  hazard: unauthorized disclosure
  conditions:
  - for the requested use or disclosure
  exceptions: []
  requirements:
  - The entity must include the name or other specific identification of the person(s)
    or class of persons to whom it may make the requested use or disclosure.
  evidence: []
  severity: high
  is_testable: true
  testability:
    reason: Must include name or specific identification of recipient; checkable by
      inspecting outputs/documents for presence of those identifiers.
    evidence_signals:
