    citation: appropriate-the-necessary-testing-and-reporting-processes-in/sent_0002
    span_id: EU_AI_2024_removed/appropriate-the-necessary-testing-and-reporting-processes-in/sent_0002
  scope:
    actor:
    - org
    data_domain: []
    context:
    - high-risk
  hazard: unaddressed risks to health, safety or fundamental rights
  conditions:
  - risks limited to those reasonably mitigable or eliminable through development
    or design or provision of adequate technical information
  - based on analysis of data gathered from the post-market monitoring system referred
    to in Article 72
  exceptions: []
  requirements:
  - org shall ensure the risk management system comprises identification and analysis
    of the known and reasonably foreseeable risks that the high-risk AI system can
    pose to health, safety or fundamental rights when used in accordance with its
    intended purpose; estimation and evaluation of the risks that may emerge when
    used in accordance with its intended purpose and under conditions of reasonably
    foreseeable misuse; evaluation of other risks based on analysis of data gathered
    from the post-market monitoring system referred to in Article 72; and adoption
    of appropriate and targeted risk management measures designed to address the risks
    identified pursuant to point (a).
  evidence: []
  severity: high
