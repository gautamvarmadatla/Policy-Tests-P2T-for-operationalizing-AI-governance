  - before deployment
  exceptions: []
  requirements:
  - Document the fallback option and the estimated time required to invoke and use
    the fallback option.
  - Provide training and documentation for stakeholders accountable for system oversight
    that supports their resolution of the failure.
  - Document your plan for managing previously unknown failures that come to light
    once the system is in use.
  - Document the time that may elapse until the entire system, across all endpoints
    can be rolled back.
  - Document the time that may elapse until the feature can be turned off across all
    endpoints.
  - Document the time that may elapse until the system has been updated across all
    endpoints.
  - Describe how customers, partners, and end users will be notified of changes to
    the system, updated understandings of failures, and their best mitigations.
  - Provide training and documentation for system owners, developers, customer support
    and other stakeholders responsible for managing the system to support their remediation
    and mitigation of predictable failures identified in requirement RS2.1.
  evidence: []
  severity: medium
