- rule_id: spans-passthrough-candidates/sent_0002-b95b775c
  source:
    doc: spans_passthrough_candidates
    citation: index/accountability-goals
    span_id: Microsoft/index/accountability-goals/goal-a5-human-oversight-and-control/sent_0002
  scope:
    context:
    - internal
    data_domain:
    - general
    actor:
    - org
  hazard: automation bias
  conditions:
  - before determining oversight responsibilities
  exceptions: []
  requirements:
  - Identify the system elements necessary for stakeholders to understand their oversight
    responsibilities and carry them out.
  - Document the system design elements that will support relevant stakeholders for
    each oversight and control function.
  - Ensure stakeholders understand the system's intended uses.
  - Provide guidance on effectively executing interactions with the system.
  - Educate stakeholders on how to interpret system behavior.
  - Clarify when and how to override, intervene, or interrupt the system.
  - Raise awareness about the tendency of over-relying on outputs produced by the
    system.
  - Identify system UX, features, alerting and reporting functions, and educational
    materials necessary for stakeholders to effectively understand their oversight
    responsibilities.
  evidence:
  - impact assessment
  severity: medium
