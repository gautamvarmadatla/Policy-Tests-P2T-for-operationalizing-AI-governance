  hazard: coerced provision of treatment or benefits
  conditions:
  - where a covered entity has conditioned the provision of treatment, payment, enrollment
    in a health plan, or eligibility for benefits on the provision of one of the authorizations
    (paragraph (b)(4))
  exceptions:
  - does not apply to a compound authorization created in accordance with paragraph
    (b)(3)(i) of this section
  requirements:
  - entity shall not combine authorizations under this section when the entity has
    conditioned provision of treatment, payment, enrollment in a health plan, or eligibility
    for benefits on the provision of one of the authorizations.
  evidence: []
  severity: high
  is_testable: true
  testability:
    reason: Checkable by inspecting authorization documents for combination and runtime
      logs/records showing conditioning of treatment/payment/enrollment.
    evidence_signals:
