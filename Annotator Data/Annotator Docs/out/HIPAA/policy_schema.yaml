  scope:
    actor:
    - provider
    data_domain:
    - PHI
    context:
    - research
  hazard: coerced research participation
  conditions:
  - where a covered health care provider has conditioned the provision of research-related
    treatment on the provision of one of the authorizations (paragraph (b)(4)(i))
  exceptions: []
  requirements:
  - provider must clearly differentiate between the conditioned and unconditioned
    components in any compound authorization created under this paragraph.
