    - PHI
    context: []
  hazard: unauthorized PHI disclosure
  conditions:
  - purpose is specified in § 164.512(d), (e), (f), or (g)(1)
  - no valid attestation obtained under paragraph (b)(1) from the person requesting
    the use or disclosure or not complying with all applicable conditions of this
    part
  exceptions: []
