    - prod
    data_domain:
    - general
    actor:
    - org
  hazard: failure to identify system issues
  conditions:
  - before deployment
  exceptions: []
  requirements:
  - 'Establish and document a detailed inventory of the system health monitoring methods
    to be used, to include: 1) data and insights generated from data repositories,
    system analytics, and associated alerts, 2) processes by which customers can submit
    information about failures and concerns, and 3) processes by which the general
    public can submit feedback.'
  - 'Define and document a standard operating procedure and system health monitoring
    action plan for each monitoring channel for the system, to include: 1) processes
    for reproducing system failures to support troubleshooting and prevention of future
    failures, 2) which events will be monitored, 3) how events will be prioritized
    for review, 4) the expected frequency of those reviews, 5) how events will be
    prioritized for response and timing to resolution, 6) how high priority issues
    related to supporting the Standard and its goals will be escalated to the Office
    of Responsible AI, and 7) engaging customer service to ensure that they are aware
    of how to respond to issues for the system.'
  evidence: []
  severity: high
