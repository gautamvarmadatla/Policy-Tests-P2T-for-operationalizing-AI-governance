  scope:
    actor:
    - developer
    data_domain: []
    context:
    - training
  hazard: bias causing harm to health or discrimination
  conditions:
  - data governance and management practices for training, validation and testing
    data sets
  exceptions: []
  requirements:
  - 'Ensure data governance and management practices for training, validation and
    testing data sets specifically address: relevant design choices; data collection
    processes and origin (and for personal data the original purpose of collection);
    data-preparation operations (annotation, labelling, cleaning, updating, enrichment
    and aggregation); formulation of assumptions about what the data measure and represent;
    assessment of availability, quantity and suitability of needed data sets; examination
    of possible biases likely to affect health and safety, fundamental rights or lead
    to discrimination; measures to detect, prevent and mitigate such biases; and identification
    of data gaps or shortcomings that prevent compliance and how to address them.'
  evidence: []
  severity: high
