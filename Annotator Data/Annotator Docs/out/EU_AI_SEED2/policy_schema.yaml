    - deployer
    data_domain: []
    context:
    - high-risk
  hazard: action based on unverified identification
  conditions:
  - Annex III 1(a) system
  - identification resulting from the system
  - unless identification has been separately verified and confirmed by at least two
    natural persons with the necessary competence, training and authority
  exceptions:
  - law enforcement, migration, border control or asylum where Union or national law
    considers verification disproportionate
  requirements:
  - The deployer shall not take any action or decision based on the identification
    resulting from the system unless that identification has been separately verified
    and confirmed by at least two natural persons with the necessary competence, training
